spring:
  application:
    name: Rulecheck

  datasource:
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
logging:
  level:
    org:
      postgresql: DEBUG
      springframework:
        jdbc: DEBUG
    com:
      zaxxer:
        hikari: DEBUG
